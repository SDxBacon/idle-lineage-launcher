version: '3'

vars:
  APP_NAME: "idle-lineage-launcher"
  VERSION: { sh: 'go run ./build/version.go' }
  BIN_DIR: "bin"
  PACKAGE_MANAGER: '{{.PACKAGE_MANAGER | default "npm"}}'
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  # Mobile builds are not supported by this project.
  # ios: ./build/ios/Taskfile.yml
  # android: ./build/android/Taskfile.yml

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  test:
    summary: Runs backend and frontend tests
    cmds:
      - go test -race ./...
      - task: common:frontend:run
        vars:
          SCRIPT: test

  release:
    summary: Packages macOS arm64/amd64 DMGs and a Windows amd64 portable executable
    platforms: [darwin]
    cmds:
      - task: darwin:release
        vars:
          VERSION: "{{.VERSION}}"
      - task: windows:release
        vars:
          VERSION: "{{.VERSION}}"

  release:auto:
    summary: Builds release assets and creates a GitHub draft release with an automatic tag
    platforms: [darwin]
    preconditions:
      - sh: command -v gh >/dev/null 2>&1
        msg: "GitHub CLI is required. Install it from https://cli.github.com/"
      - sh: gh auth status >/dev/null 2>&1
        msg: "GitHub CLI is not authenticated. Run: gh auth login -h github.com"
      - sh: test -z "$(git status --porcelain)"
        msg: "The working tree must be clean before creating a release."
      - sh: test "$(git branch --show-current)" = "main"
        msg: "release:auto must run from the main branch."
      - sh: test "$(git rev-parse HEAD)" = "$(gh api repos/$(gh repo view --json nameWithOwner --jq .nameWithOwner)/commits/main --jq .sha)"
        msg: "Local main must match the remote main branch before creating a release. Push or pull the pending commits first."
    cmds:
      - task: release
        vars:
          VERSION: "{{.VERSION}}"
      - |
        set -euo pipefail

        tag="v{{.VERSION}}"
        repo="$(gh repo view --json nameWithOwner --jq .nameWithOwner)"

        if gh api "repos/${repo}/git/ref/tags/${tag}" >/dev/null 2>&1; then
          echo "Release tag ${tag} already exists. Choose a new VERSION." >&2
          exit 1
        fi

        gh release create "${tag}" \
          "release/{{.VERSION}}/{{.APP_NAME}}-macos-arm64.dmg" \
          "release/{{.VERSION}}/{{.APP_NAME}}-macos-amd64.dmg" \
          "release/{{.VERSION}}/{{.APP_NAME}}-windows-amd64.exe" \
          --draft \
          --generate-notes \
          --title "${tag}" \
          --target "$(git rev-parse HEAD)"

  release:macos:
    summary: Builds ad-hoc signed arm64 and amd64 DMGs
    platforms: [darwin]
    cmds:
      - task: darwin:release
        vars:
          VERSION: "{{.VERSION}}"

  release:windows:
    summary: Builds the unsigned Windows x64 portable executable
    cmds:
      - task: windows:release
        vars:
          VERSION: "{{.VERSION}}"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  # Docker builds are not supported by this project.
  # setup:docker:
  #   summary: Builds Docker image for cross-compilation (~800MB download)
  #   cmds:
  #     - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  # build:docker:
  #   summary: Builds a Docker image for server mode deployment
  #   cmds:
  #     - task: common:build:docker

  # run:docker:
  #   summary: Builds and runs the Docker image
  #   cmds:
  #     - task: common:run:docker

  bump:
    summary: 'Bump patch version (e.g. 0.1.0 → 0.1.1). Override with SET_VERSION=x.y.z'
    cmds:
      - go run ./build/bump_version.go '{{if .SET_VERSION}}{{.SET_VERSION}}{{else}}patch{{end}}'
      - wails3 task common:update:build-assets

  bump:minor:
    summary: 'Bump minor version (e.g. 0.1.0 → 0.2.0)'
    cmds:
      - go run ./build/bump_version.go minor
      - wails3 task common:update:build-assets

  bump:major:
    summary: 'Bump major version (e.g. 0.1.0 → 1.0.0)'
    cmds:
      - go run ./build/bump_version.go major
      - wails3 task common:update:build-assets
